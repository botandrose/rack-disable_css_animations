name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        ruby: [ "3.3", "3.4", "4.0" ]

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Run the default task
      run: bundle exec rake
